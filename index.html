<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevenção de White Flash: Fundo escuro imediato -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #1a2e4e !important;
        height: 100%;
        width: 100%;
        overflow-x: hidden;
      }
      
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .loader-text {
        color: #daa520;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 1.2rem;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(218, 165, 32, 0.1);
        border-top-color: #daa520;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #daa520;
        color: #1a2e4e;
        padding: 8px;
        z-index: 100;
        transition: top 0.3s;
      }
      .skip-link:focus { top: 0; }
    </style>

    <!-- SEO e Redes Sociais -->
    <title>NPA — Construção e Reformas | Especialista no Morumbi & SP</title>
    <meta name="description" content="Reformas residenciais e comerciais de alto padrão em São Paulo. Orçamento rápido via WhatsApp. Qualidade, prazo e confiança." />
    <!-- Open Graph (Compartilhamento no WhatsApp/Instagram) -->
    <meta property="og:title" content="NPA — Construção e Reformas" />
    <meta property="og:description" content="Reformas residenciais e comerciais de alto padrão em São Paulo. Orçamento rápido via WhatsApp." />

    <link rel="canonical" href="https://landing-page-for-napedroantonio.vercel.app/" />
    <meta property="og:image" content="/assets/og-image.jpg" />
    <meta property="og:type" content="website" />
