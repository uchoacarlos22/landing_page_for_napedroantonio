<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevenção de White Flash: Fundo escuro imediato -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #1a2e4e !important;
        height: 100%;
        width: 100%;
        overflow-x: hidden;
      }
      
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .loader-text {
        color: #daa520;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 1.2rem;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(218, 165, 32, 0.1);
        border-top-color: #daa520;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #daa520;
        color: #1a2e4e;
        padding: 8px;
        z-index: 100;
        transition: top 0.3s;
      }
      .skip-link:focus { top: 0; }
    </style>

    <!-- Title e descrição SEO -->
    <title>NPA — Construção e Reformas</title>
    <meta name="description" content="NPA — Construção e reformas residenciais e comerciais em São Paulo. Orçamento grátis e profissionais especializados." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/trator-icon.svg" />


    <!-- Preload da imagem hero (LCP) -->
    <link rel="preload" as="image" href="/assets/hero.webp" />
  </head>

  <body>
    <a class="skip-link" href="#main">Ir para o conteúdo principal</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
